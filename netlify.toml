# Netlify Configuration for 2D Aquatic
# Tự động chạy build khi có content mới

[build]
  publish = "."
  command = "node build.js"

[build.environment]
  NODE_VERSION = "20"

# Bật Netlify Identity (cho Decap CMS login)
[[plugins]]
  package = "netlify-plugin-debug-cache"

# ===== HEADERS (đã có trong _headers, đây là backup) =====
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ===== REDIRECTS =====

# Admin URL có trailing slash
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Form success page
[[redirects]]
  from = "/cam-on/"
  to = "/cam-on"
  status = 301
  force = true
