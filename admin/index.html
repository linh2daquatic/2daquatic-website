<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Quản lý nội dung — 2D Aquatic</title>
<link rel="icon" href="/favicon.ico">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  margin: 0;
}
.loading-message {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.loading-message h2 {
  margin: 0 0 8px;
}
.loading-message p {
  margin: 4px 0;
  color: #666;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="loading-message" id="loading">
  <h2>Đang tải hệ thống quản lý...</h2>
  <p>Nếu trang không load, vui lòng refresh (F5)</p>
  <p style="color: #888; font-size: 13px; margin-top: 12px">
    Đăng nhập bằng tài khoản GitHub đã được cấp quyền
  </p>
</div>

<!-- Decap CMS — pin về v3.1.10 vì v3.12+ có bug appendChild -->
<script src="https://unpkg.com/decap-cms@3.1.10/dist/decap-cms.js"></script>

<script>
  // Khi Decap CMS đã sẵn sàng, ẩn loading message
  if (window.CMS) {
    window.CMS.registerEventListener({
      name: 'preSave',
      handler: function() { /* placeholder */ }
    });
  }
  // Backup: sau 3 giây tự ẩn loading nếu CMS đã render
  setTimeout(function() {
    var nc = document.getElementById('nc-root');
    if (nc && nc.children.length > 0) {
      var loader = document.getElementById('loading');
      if (loader) loader.style.display = 'none';
    }
  }, 3000);
</script>
</body>
</html>
